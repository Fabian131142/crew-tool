<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    body { padding-top: 58px; background: #f4f6f9; font-size: .92rem; }

    .btn-ms { background: #0078d4; color: #fff; border: none; padding: .7rem 1.5rem; border-radius: 6px; font-size: .95rem; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-ms:hover { background: #006cbf; }
  </style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════
const CLIENT_ID = 'aa970388-238d-4faf-877d-1fe78d3cd8de';
const TENANT_ID = '3285e781-a828-40a7-8f13-00b489371bb9';
const SP_SITE   = 'https://martraconeu.sharepoint.com/sites/Management';
const SP_SCOPE  = 'https://martraconeu.sharepoint.com/.default openid profile';
const API       = `${SP_SITE}/_api/web`;
const REDIRECT  = window.location.origin + window.location.pathname;

// ═══════════════════════════════════════════════════════════════════
// OAUTH2 + PKCE  (no external library — uses built-in Web Crypto)
// ═══════════════════════════════════════════════════════════════════

function rndStr(len) {
  const a = new Uint8Array(len);
  crypto.getRandomValues(a);
  return Array.from(a, b => b.toString(16).padStart(2,'0')).join('').slice(0, len);
}

async function generatePKCE() {
  const verifier = rndStr(64);
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return { verifier, challenge };
}

async function doLogin() {
  const { verifier, challenge } = await generatePKCE();
  const state = rndStr(32);
  sessionStorage.setItem('pkce_v', verifier);
  sessionStorage.setItem('oauth_s', state);
  const p = new URLSearchParams({ client_id:CLIENT_ID, response_type:'code',
    redirect_uri:REDIRECT, scope:SP_SCOPE, state, code_challenge:challenge,
    code_challenge_method:'S256' });
  window.location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${p}`;
}

async function handleCallback() {
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code');
  if (!code) return false;
  if (p.get('error')) throw new Error(p.get('error_description') || p.get('error'));
  if (p.get('state') !== sessionStorage.getItem('oauth_s')) throw new Error('State mismatch — reload and try again.');
  const verifier = sessionStorage.getItem('pkce_v');
  const r = await fetch(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`, {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ client_id:CLIENT_ID, grant_type:'authorization_code',
      code, redirect_uri:REDIRECT, code_verifier:verifier }),
  });
  const t = await r.json();
  if (t.error) throw new Error(t.error_description || t.error);
  sessionStorage.setItem('at', t.access_token);
  sessionStorage.setItem('at_exp', Date.now() + t.expires_in * 1000);
  if (t.id_token) {
    try {
      const claims = JSON.parse(atob(t.id_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      sessionStorage.setItem('uname', claims.name || claims.preferred_username || '');
    } catch {}
  }
  window.history.replaceState({}, '', window.location.pathname);
  return true;
}

async function getToken() {
  const at  = sessionStorage.getItem('at');
  const exp = parseInt(sessionStorage.getItem('at_exp') || '0');
  if (!at || Date.now() > exp - 60000) { doLogin(); throw new Error('Re-authenticating…'); }
  return at;
}

function doLogout() {
  sessionStorage.clear();
  window.location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/logout?post_logout_redirect_uri=${encodeURIComponent(REDIRECT)}`;
}

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const S = {
  vessels:[], clients:[], ranks:[], agencies:[], salaryRates:[],
  currentView:null, prevViewName:'open', userName:'', pendingStatus:null, pendingClose:null, pendingCand:null,
};

// ═══════════════════════════════════════════════════════════════════
// SHAREPOINT API  (Bearer token — no Form Digest needed)
// ═══════════════════════════════════════════════════════════════════
async function spGet(list, query='') {
  const token = await getToken();
  const r = await fetch(`${API}/lists/getbytitle('${enc(list)}')/items${query}`,
    { headers:{ Authorization:`Bearer ${token}`, Accept:'application/json;odata=verbose' } });
  if (!r.ok) throw new Error(`GET ${list}: ${r.status}`);
  const j = await r.json();
  let results = j.d.results, next = j.d.__next;
  while (next) {
    const r2 = await fetch(next, { headers:{ Authorization:`Bearer ${token}`, Accept:'application/json;odata=verbose' } });
    const j2 = await r2.json(); results = results.concat(j2.d.results); next = j2.d.__next;
  }
  return results;
}

async function spGetOne(list, id, query='') {
  const token = await getToken();
  const r = await fetch(`${API}/lists/getbytitle('${enc(list)}')/items(${id})${query}`,
    { headers:{ Authorization:`Bearer ${token}`, Accept:'application/json;odata=verbose' } });
  if (!r.ok) throw new Error(`GET ${list}(${id}): ${r.status}`);
  return (await r.json()).d;
}

async function spCreate(list, data) {
  const token = await getToken();
  const r = await fetch(`${API}/lists/getbytitle('${enc(list)}')/items`, {
    method:'POST',
    headers:{ Authorization:`Bearer ${token}`, Accept:'application/json;odata=verbose', 'Content-Type':'application/json;odata=verbose' },
    body: JSON.stringify({ __metadata:{ type:listType(list) }, ...data }),
  });
  if (!r.ok) { const t=await r.text(); throw new Error(`Create ${list}: ${r.status} — ${t.substring(0,300)}`); }
  return (await r.json()).d;
}

async function spUpdate(list, id, data) {
  const token = await getToken();
  const r = await fetch(`${API}/lists/getbytitle('${enc(list)}')/items(${id})`, {
    method:'POST',
    headers:{ Authorization:`Bearer ${token}`, Accept:'application/json;odata=verbose', 'Content-Type':'application/json;odata=verbose', 'IF-MATCH':'*', 'X-HTTP-Method':'MERGE' },
    body: JSON.stringify({ __metadata:{ type:listType(list) }, ...data }),
  });
  if (!r.ok) { const t=await r.text(); throw new Error(`Update ${list}(${id}): ${r.status} — ${t.substring(0,300)}`); }
}

function listType(list) {
  const m={ VesselMaster:'SP.Data.VesselMasterListItem', ClientMaster:'SP.Data.ClientMasterListItem', RankList:'SP.Data.RankListListItem', AgencyList:'SP.Data.AgencyListListItem', SalaryRates:'SP.Data.SalaryRatesListItem', Vacancies:'SP.Data.VacanciesListItem', Candidates:'SP.Data.CandidatesListItem', StatusHistory:'SP.Data.StatusHistoryListItem' };
  return m[list]||'SP.ListItem';
}
function enc(s) { return encodeURIComponent(s); }

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function h(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if(!d) return '—'; const m=d.match(/(\d{4})-(\d{2})-(\d{2})/); return m?`${m[3]}.${m[2]}.${m[1]}`:d; }
function fmtSalary(min,max,cur) { if(!min&&min!==0) return '—'; const c=cur||'EUR',fmt=n=>Number(n).toLocaleString('de-DE'); return (max&&max!==min)?`${fmt(min)}–${fmt(max)} ${c}`:`${fmt(min)} ${c}`; }
function joiningStr(v) { if(v.JoiningDateOverride) return fmtDate(v.JoiningDateOverride); if(v.JoiningWeek&&v.JoiningYear) return `W${v.JoiningWeek}/${v.JoiningYear}`; if(v.JoiningWeek) return `W${v.JoiningWeek}`; return '—'; }
function isoDate(d) { return d?d.split('T')[0]:''; }
function nowIso() { return new Date().toISOString(); }
function statusBadge(s) { const c={'Open':'sb-open','Offer Made':'sb-offer','Cancelled':'sb-cancelled','Closed':'sb-closed','(New)':'sb-new'}[s]||'sb-new'; return `<span class="sb ${c}">${h(s||'—')}</span>`; }
function toast(msg,type='success') {
  const id='tk'+Date.now(), bg=type==='success'?'bg-success':type==='danger'?'bg-danger':'bg-warning text-dark', ic=type==='success'?'bi-check-circle':type==='danger'?'bi-exclamation-triangle':'bi-info-circle';
  document.getElementById('toast-wrap').insertAdjacentHTML('beforeend',`<div id="${id}" class="toast align-items-center text-white ${bg} border-0 show shadow mb-2" role="alert" style="min-width:260px"><div class="d-flex"><div class="toast-body"><i class="bi ${ic} me-2"></i>${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('.toast').remove()"></button></div></div>`);
  setTimeout(()=>document.getElementById(id)?.remove(),4500);
}
function spin(el) { el.innerHTML='<div class="loading"><div class="spinner-border text-primary" style="width:2rem;height:2rem"></div></div>'; }
function errBox(e) { return `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i><strong>Error:</strong> ${h(e.message)}</div>`; }

// ═══════════════════════════════════════════════════════════════════
// REFERENCE DATA
// ═══════════════════════════════════════════════════════════════════
async function loadRefData() {
  const [vessels,ranks,salaryRates,clients,agencies] = await Promise.all([
    spGet('VesselMaster','?$select=Id,Title,Abbreviation,MartraconEntity,ServiceType,Flag,BuiltYear,VesselType,Union,ManagementNationality,IsActive,ClientId,Client/Title,Client/Id&$expand=Client&$filter=IsActive eq 1&$orderby=Title&$top=500'),
    spGet('RankList','?$select=Id,Title,RankCategory,SortOrder,IsActive&$filter=IsActive eq 1&$orderby=SortOrder&$top=200'),
    spGet('SalaryRates','?$select=Id,Title,EffectiveYear,SalaryMin,SalaryMax,Currency,ClientId,RankId,SeniorityLevel,CBACode&$top=2000'),
    spGet('ClientMaster','?$select=Id,Title,IsActive&$orderby=Title&$top=200'),
    spGet('AgencyList','?$select=Id,Title,AgencyType,IsActive&$filter=IsActive eq 1&$orderby=Title&$top=100'),
  ]);
  S.vessels=vessels; S.ranks=ranks; S.salaryRates=salaryRates; S.clients=clients; S.agencies=agencies;
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function nav(name,param=null) {
  ['open','all','detail','salary','admin'].forEach(v=>document.getElementById('v-'+v).classList.add('d-none'));
  document.querySelectorAll('.nav-link[id^="nav-"]').forEach(l=>l.classList.remove('active'));
  const navEl=document.getElementById('nav-'+(name==='detail'?S.prevViewName:name));
  if(navEl) navEl.classList.add('active');
  S.prevViewName=(name!=='detail')?name:S.prevViewName;
  S.currentView=name;
  document.getElementById('v-'+name).classList.remove('d-none');
  if(name==='open') renderOpen();
  else if(name==='all') renderAll();
  else if(name==='detail') renderDetail(param);
  else if(name==='salary') renderSalary();
  else if(name==='admin') renderAdmin();
}
function goDetail(id) { nav('detail',id); }
function goBack() { nav(S.prevViewName||'open'); }

// ═══════════════════════════════════════════════════════════════════
// VIEW: OPEN VACANCIES
// ═══════════════════════════════════════════════════════════════════
async function renderOpen() {
  const el=document.getElementById('v-open'); spin(el);
  try {
    const vacs=await loadVacancies(`Status eq 'Open' or Status eq 'Offer Made'`);
    const openCt=vacs.filter(v=>v.Status==='Open').length, offerCt=vacs.filter(v=>v.Status==='Offer Made').length;
    el.innerHTML=`<div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <h4 class="sec-title mb-0 me-auto">Open Positions</h4>

// VIEW: ALL VACANCIES

async function renderAll() {
  const el=document.getElementById('v-all'); spin(el);
  try {
    const vacs=await loadVacancies(null); window._allVacs=vacs;
    const clientOpts=[...new Set(vacs.map(v=>v.Client?.Title).filter(Boolean))].sort().map(c=>`<option value="${h(c)}">${h(c)}</option>`).join('');
    el.innerHTML=`<div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <h4 class="sec-title mb-0 me-auto">All Vacancies</h4>
      <button class="btn btn-sm btn-primary" onclick="goDetail(null)"><i class="bi bi-plus-lg me-1"></i>New Vacancy</button>
    </div>
    <div class="card shadow-sm mb-3"><div class="card-body py-2"><div class="row g-2 align-items-end">
      <div class="col-auto"><label class="form-label form-label-sm mb-1">Status</label>
        <select class="form-select form-select-sm" id="f-status" onchange="filterAll()"><option value="">All</option><option value="Open">Open</option><option value="Offer Made">Offer Made</option><option value="Closed">Closed</option><option value="Cancelled">Cancelled</option></select></div>
      <div class="col-auto"><label class="form-label form-label-sm mb-1">Client</label>
        <select class="form-select form-select-sm" id="f-client" onchange="filterAll()"><option value="">All clients</option>${clientOpts}</select></div>
      <div class="col"><label class="form-label form-label-sm mb-1">Search</label>
        <input class="form-control form-control-sm" id="f-search" type="text" placeholder="Vessel or rank…" oninput="filterAll()"></div>
      <div class="col-auto"><button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('f-status').value='';document.getElementById('f-client').value='';document.getElementById('f-search').value='';filterAll()">Clear</button></div>
    </div></div></div>
    <div id="all-table"></div>`;
    filterAll();
  } catch(e) { el.innerHTML=errBox(e); }
}
function filterAll() {
  const status=document.getElementById('f-status')?.value||'', client=document.getElementById('f-client')?.value||'', q=(document.getElementById('f-search')?.value||'').toLowerCase();
  const vacs=(window._allVacs||[]).filter(v=>{ if(status&&v.Status!==status) return false; if(client&&v.Client?.Title!==client) return false; if(q&&!((v.Vessel?.Title||'').toLowerCase().includes(q)||(v.Rank?.Title||'').toLowerCase().includes(q))) return false; return true; });
  const el=document.getElementById('all-table'); if(el) el.innerHTML=buildVacTable(vacs,'No vacancies match.',true);
}
function loadVacancies(filter) {
  const fq=filter?`?$filter=${encodeURIComponent(filter)}&`:'?';
  return spGet('Vacancies',`${fq}$select=Id,Title,Status,ReceivedDate,JoiningWeek,JoiningYear,JoiningDateOverride,SalaryMin,SalaryMax,SalaryCurrency,NationalityRequirements,IsLegacyMigrated,VesselId,Vessel/Title,ClientId,Client/Title,RankId,Rank/Title&$expand=Vessel,Client,Rank&$orderby=ReceivedDate desc&$top=2000`);
}
function buildVacTable(vacs,emptyMsg='No vacancies found.',showLegacy=false) {
  const rows=vacs.length?vacs.map(v=>`<tr class="vac-row" onclick="goDetail(${v.Id})">
    <td class="ps-3">${statusBadge(v.Status)}</td><td><strong>${h(v.Vessel?.Title||'—')}</strong></td>
    <td>${h(v.Rank?.Title||'—')}</td><td class="text-muted">${h(v.Client?.Title||'—')}</td>
    <td>${fmtDate(v.ReceivedDate)}</td><td>${joiningStr(v)}</td>
    <td class="text-nowrap">${fmtSalary(v.SalaryMin,v.SalaryMax,v.SalaryCurrency)}</td>
    <td class="text-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h((v.NationalityRequirements||'').substring(0,60))}</td>
    ${showLegacy?`<td>${v.IsLegacyMigrated?'<span class="badge bg-secondary" style="font-size:.65rem">legacy</span>':''}</td>`:''}
  </tr>`).join(''):`<tr><td colspan="${showLegacy?9:8}" class="text-center text-muted py-5">${emptyMsg}</td></tr>`;
  return `<div class="card shadow-sm"><div class="table-responsive"><table class="table table-hover table-sm mb-0 align-middle">
    <thead style="background:var(--mc-navy);color:#fff"><tr><th class="ps-3">Status</th><th>Vessel</th><th>Rank</th><th>Client</th><th>Received</th><th>Joining</th><th>Salary</th><th>Nationality</th>${showLegacy?'<th></th>':''}</tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="card-footer text-muted" style="font-size:.78rem">${vacs.length} record${vacs.length!==1?'s':''}</div></div>`;
}

function buildStatusCtrl(status,vacId) {
  const btns=[];
  if(status==='Open') { btns.push(`<button class="btn btn-sm btn-warning" onclick="triggerStatus(${vacId},'Open','Offer Made')"><i class="bi bi-handshake me-1"></i>Offer Made</button>`); btns.push(`<button class="btn btn-sm btn-outline-secondary" onclick="triggerStatus(${vacId},'Open','Cancelled')"><i class="bi bi-x-circle me-1"></i>Cancel</button>`); }
  else if(status==='Offer Made') { btns.push(`<button class="btn btn-sm btn-outline-primary" onclick="triggerStatus(${vacId},'Offer Made','Open')"><i class="bi bi-arrow-counterclockwise me-1"></i>Revert to Open</button>`); btns.push(`<button class="btn btn-sm btn-success" onclick="triggerClose(${vacId})"><i class="bi bi-check-circle me-1"></i>Close (Filled)</button>`); btns.push(`<button class="btn btn-sm btn-outline-secondary" onclick="triggerStatus(${vacId},'Offer Made','Cancelled')"><i class="bi bi-x-circle me-1"></i>Cancel</button>`); }
  else if(status==='Cancelled') { btns.push(`<button class="btn btn-sm btn-outline-primary" onclick="triggerStatus(${vacId},'Cancelled','Open')"><i class="bi bi-arrow-counterclockwise me-1"></i>Re-open</button>`); }
  return btns.join('');
}

function onVesselChange(sel) {
  const opt=sel.selectedOptions[0];
  if(!opt?.value) { ['f-client-name','f-entity','f-service'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';}); document.getElementById('f-client-id').value=''; document.getElementById('vessel-info-card').style.display='none'; return; }
  document.getElementById('f-client-name').value=opt.dataset.clientname||''; document.getElementById('f-client-id').value=opt.dataset.clientid||''; document.getElementById('f-entity').value=opt.dataset.entity||''; document.getElementById('f-service').value=opt.dataset.service||'';
  document.getElementById('vessel-info-card').style.display=''; refreshVesselSidebar(opt.value); onRankChange();
}

function refreshVesselSidebar(vesselId) {
  const v=S.vessels.find(x=>x.Id==vesselId), body=document.getElementById('vessel-info-body');
  if(!body) return;
  if(!v) { body.innerHTML='—'; return; }
  body.innerHTML=`<strong>${h(v.Title)}</strong><br><span class="text-muted">Flag:</span> ${h(v.Flag||'—')} &nbsp;<span class="text-muted">Built:</span> ${v.BuiltYear||'—'} &nbsp;<span class="text-muted">Type:</span> ${h(v.VesselType||'—')}<br><span class="text-muted">Entity:</span> ${h(v.MartraconEntity||'—')} &nbsp;<span class="text-muted">Service:</span> ${h(v.ServiceType||'—')}<br><span class="text-muted">Union:</span> ${h(v.Union||'—')}<br><span class="text-muted">Mgt. nationality:</span> ${h(v.ManagementNationality||'—')}`;
}

function onRankChange() {
  const clientId=document.getElementById('f-client-id')?.value, rankId=document.getElementById('f-rank')?.value;
  if(!clientId||!rankId) return;
  const year=new Date().getFullYear();
  const rate=S.salaryRates.find(r=>String(r.ClientId)===String(clientId)&&String(r.RankId)===String(rankId)&&r.EffectiveYear==year)||S.salaryRates.find(r=>String(r.ClientId)===String(clientId)&&String(r.RankId)===String(rankId));
  const hint=document.getElementById('sal-hint'), hintRow=document.getElementById('sal-hint-row');
  if(rate) { if(rate.SalaryMin) document.getElementById('f-smin').value=rate.SalaryMin; if(rate.SalaryMax) document.getElementById('f-smax').value=rate.SalaryMax; if(rate.Currency) document.getElementById('f-scur').value=rate.Currency; if(hint) hint.innerHTML=`<i class="bi bi-info-circle me-1"></i>Pre-filled from ${rate.EffectiveYear||'stored'} salary scale${rate.CBACode?' · CBA: '+h(rate.CBACode):''}. Always editable.`; if(hintRow) hintRow.classList.remove('d-none'); }
  else { if(hintRow) hintRow.classList.add('d-none'); }
}

function toggleNegNote() { const src=document.getElementById('f-ssrc')?.value, row=document.getElementById('neg-note-row'); if(row) row.style.display=src==='Negotiated'?'':'none'; }

// ═══════════════════════════════════════════════════════════════════
// SAVE VACANCY
// ═══════════════════════════════════════════════════════════════════
async function saveVacancy(id) {
  const vesselId=document.getElementById('f-vessel')?.value, rankId=document.getElementById('f-rank')?.value, clientId=document.getElementById('f-client-id')?.value, received=document.getElementById('f-received')?.value;
  if(!vesselId) { toast('Please select a vessel','danger'); return; }
  if(!rankId)   { toast('Please select a rank','danger'); return; }
  if(!received) { toast('Please enter a received date','danger'); return; }
  const vessel=S.vessels.find(v=>v.Id==vesselId), rank=S.ranks.find(r=>r.Id==rankId), titleStr=`${vessel?.Title||'?'} — ${rank?.Title||'?'} — ${received}`;
  const joindateVal=document.getElementById('f-joindate')?.value;
  const data={ Title:titleStr, VesselId:parseInt(vesselId), RankId:parseInt(rankId), ...(clientId?{ClientId:parseInt(clientId)}:{}), ReceivedDate:`${received}T00:00:00Z`, JoiningWeek:parseInt(document.getElementById('f-week')?.value)||null, JoiningYear:parseInt(document.getElementById('f-year')?.value)||null, JoiningDateOverride:joindateVal?`${joindateVal}T00:00:00Z`:null, ContractDurationValue:parseFloat(document.getElementById('f-cdur')?.value)||null, ContractDurationUnit:document.getElementById('f-cunit')?.value||'Months', ContractTolerance:parseFloat(document.getElementById('f-ctol')?.value)||null, SalaryMin:parseFloat(document.getElementById('f-smin')?.value)||null, SalaryMax:parseFloat(document.getElementById('f-smax')?.value)||null, SalaryCurrency:document.getElementById('f-scur')?.value||'EUR', SalarySource:document.getElementById('f-ssrc')?.value||'Scale', SalaryNegotiatedNote:document.getElementById('f-snote')?.value||null, NationalityRequirements:document.getElementById('f-nat')?.value||null, Remarks:document.getElementById('f-remarks')?.value||null };
  const btn=document.getElementById('btn-save'); if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Saving…';}
  try {
    if(id&&id!=='null') { await spUpdate('Vacancies',id,data); toast('Changes saved'); renderDetail(id); }
    else { data.Status='Open'; data.IsLegacyMigrated=false; const created=await spCreate('Vacancies',data); await spCreate('StatusHistory',{Title:`${titleStr} — (New)→Open`,VacancyId:created.Id,FromStatus:'(New)',ToStatus:'Open',ChangedBy:S.userName,ChangedAt:nowIso()}); toast('Vacancy created'); nav('detail',created.Id); }
  } catch(e) { toast(`Save failed: ${e.message}`,'danger'); if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-floppy me-1"></i>Save Changes';} }
}

// ═══════════════════════════════════════════════════════════════════
// STATUS LIFECYCLE
// ═══════════════════════════════════════════════════════════════════
function triggerStatus(vacId,from,to) {
  S.pendingStatus={vacId,from,to};
  const hints={'Open→Offer Made':'Record that an offer has been made. Can be reverted.','Offer Made→Open':'Revert — e.g. seafarer declined.','Open→Cancelled':'Position no longer needed.','Offer Made→Cancelled':'Cancelled after offer was made.','Cancelled→Open':'Re-open a previously cancelled position.'};
  document.getElementById('modal-status-body').innerHTML=`<p class="mb-2">Change status: ${statusBadge(from)} &rarr; ${statusBadge(to)}</p>${hints[`${from}→${to}`]?`<p class="text-muted small">${hints[`${from}→${to}`]}</p>`:''}<div><label class="form-label fw-bold">Reason <span class="text-muted fw-normal">(optional)</span></label><textarea class="form-control" id="status-reason" rows="2"></textarea></div>`;
  document.getElementById('btn-status-ok').onclick=confirmStatus;
  new bootstrap.Modal(document.getElementById('modalStatus')).show();
}
async function confirmStatus() {
  const{vacId,from,to}=S.pendingStatus, reason=document.getElementById('status-reason')?.value||'';
  bootstrap.Modal.getInstance(document.getElementById('modalStatus'))?.hide();
  try { await spUpdate('Vacancies',vacId,{Status:to}); await spCreate('StatusHistory',{Title:`Status ${from} → ${to}`,VacancyId:vacId,FromStatus:from,ToStatus:to,ChangedBy:S.userName,ChangedAt:nowIso(),Reason:reason||null}); toast(`Status → ${to}`); renderDetail(vacId); }
  catch(e) { toast(`Status change failed: ${e.message}`,'danger'); }
}

function triggerClose(vacId) {
  S.pendingClose={vacId};
  document.getElementById('cl-outcome').value=''; document.getElementById('cl-method').value='Email'; document.getElementById('cl-conf-date').value=isoDate(new Date().toISOString()); document.getElementById('cl-signon').value=''; document.getElementById('cl-seafarer').value=''; document.getElementById('cl-cand-id').value=''; document.getElementById('cl-closed-by').value=S.userName;
  document.getElementById('btn-close-ok').onclick=confirmClose;
  new bootstrap.Modal(document.getElementById('modalClose')).show();
}
async function confirmClose() {
  const{vacId}=S.pendingClose, outcome=document.getElementById('cl-outcome').value;
  if(!outcome){toast('Please select an outcome','warning');return;}
  bootstrap.Modal.getInstance(document.getElementById('modalClose'))?.hide();
  try {
    const cv=document.getElementById('cl-conf-date').value, sv=document.getElementById('cl-signon').value;
    await spUpdate('Vacancies',vacId,{Status:'Closed',VacancyOutcome:outcome,ConfirmationMethod:document.getElementById('cl-method').value,ConfirmationDate:cv?`${cv}T00:00:00Z`:null,SignOnDate:sv?`${sv}T00:00:00Z`:null,PlacedSeafarerName:document.getElementById('cl-seafarer').value||null,PlacedSeafarerCandidateID:parseInt(document.getElementById('cl-cand-id').value)||null,ClosedByUser:document.getElementById('cl-closed-by').value||S.userName});
    await spCreate('StatusHistory',{Title:`Status Offer Made → Closed`,VacancyId:vacId,FromStatus:'Offer Made',ToStatus:'Closed',ChangedBy:S.userName,ChangedAt:nowIso(),Reason:outcome});
    toast('Vacancy closed ✓'); renderDetail(vacId);
  } catch(e){toast(`Close failed: ${e.message}`,'danger');}
}

// ═══════════════════════════════════════════════════════════════════
// CANDIDATES (Phase 3c)
// ═══════════════════════════════════════════════════════════════════
function candidateBadge(s) {
  const c={'Applied':'cb-applied','Shortlisted':'cb-shortlisted','Offered':'cb-offered','Placed':'cb-placed','Rejected':'cb-rejected'}[s]||'cb-applied';
  return `<span class="cb ${c}">${h(s||'—')}</span>`;
}

async function loadCandidatesSection(vacId) {
  const panel=document.getElementById('candidates-panel');
  if(!panel) return;
  try {
    const cands=await spGet('Candidates',`?$filter=VacancyId eq ${vacId}&$orderby=Created desc&$top=100`);
    if(!cands.length) {
      panel.innerHTML=`<div class="text-center text-muted py-5"><i class="bi bi-people" style="font-size:2.5rem;opacity:.25"></i><div class="mt-2">No candidates yet — use Add Candidate to track applicants.</div></div>`;
      return;
    }
    const rows=cands.map(c=>`<tr class="cand-row">
      <td class="ps-3"><strong>${h(c.Title)}</strong></td>
      <td>${h(c.Nationality||'—')}</td>
      <td>${h(c.AgencyName||'—')}</td>
      <td>${c.Phone?`<a href="tel:${h(c.Phone)}">${h(c.Phone)}</a>`:'—'}</td>
      <td>${c.Email?`<a href="mailto:${h(c.Email)}">${h(c.Email)}</a>`:'—'}</td>
      <td class="text-center">${c.CVLink?`<a href="${h(c.CVLink)}" target="_blank" class="btn btn-outline-secondary btn-sm py-0 px-1" title="Open CV"><i class="bi bi-file-earmark-person"></i></a>`:'—'}</td>
      <td>${candidateBadge(c.CandidateStatus||'Applied')}</td>
      <td class="text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${h(c.Notes||'')}">${h((c.Notes||'').substring(0,80))}</td>
      <td class="pe-2"><div class="d-flex gap-1 flex-nowrap">${buildCandidateActions(c,vacId)}</div></td>
    </tr>`).join('');
    panel.innerHTML=`<div class="table-responsive"><table class="table table-sm mb-0 align-middle">
      <thead style="background:#f0f4f8;font-size:.8rem"><tr>
        <th class="ps-3">Name</th><th>Nationality</th><th>Agency</th><th>Phone</th><th>Email</th><th>CV</th><th>Status</th><th>Notes</th><th></th>
      </tr></thead><tbody>${rows}</tbody>
    </table></div>
    <div class="card-footer text-muted" style="font-size:.78rem">${cands.length} candidate${cands.length!==1?'s':''}</div>`;
  } catch(e) { if(panel) panel.innerHTML=`<div class="p-3">${errBox(e)}</div>`; }
}

function buildCandidateActions(c,vacId) {
  const id=c.Id, status=c.CandidateStatus||'Applied', btns=[];
  if(status==='Applied')     btns.push(`<button class="btn btn-outline-primary btn-sm py-0" style="font-size:.75rem" onclick="setCandidateStatus(${id},'Shortlisted',${vacId})">Shortlist</button>`);
  if(status==='Shortlisted') btns.push(`<button class="btn btn-warning btn-sm py-0" style="font-size:.75rem" onclick="setCandidateStatus(${id},'Offered',${vacId})">Offer</button>`);
  if(status==='Offered')     btns.push(`<button class="btn btn-success btn-sm py-0" style="font-size:.75rem" onclick="setCandidateStatus(${id},'Placed',${vacId})">Placed ✓</button>`);
  if(status!=='Placed'&&status!=='Rejected') btns.push(`<button class="btn btn-outline-danger btn-sm py-0" style="font-size:.75rem" onclick="setCandidateStatus(${id},'Rejected',${vacId})">Reject</button>`);
  btns.push(`<button class="btn btn-outline-secondary btn-sm py-0 px-1" onclick="openCandidateModal(${vacId},${id})" title="Edit"><i class="bi bi-pencil"></i></button>`);
  return btns.join('');
}

async function setCandidateStatus(candId,status,vacId) {
  try { await spUpdate('Candidates',candId,{CandidateStatus:status}); toast(`→ ${status}`); loadCandidatesSection(vacId); }
  catch(e) { toast(`Failed: ${e.message}`,'danger'); }
}

function openCandidateModal(vacId,candId=null) {
  S.pendingCand={vacId,candId};
  // Populate agency datalist
  const dl=document.getElementById('cm-agency-list');
  if(dl) dl.innerHTML=S.agencies.map(a=>`<option value="${h(a.Title)}">`).join('');
  // Reset form
  ['cm-name','cm-nat','cm-agency','cm-phone','cm-email','cm-cvlink','cm-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('cm-status').value='Applied';
  document.getElementById('cm-title').innerHTML=`<i class="bi bi-person-${candId?'gear':'plus'} me-2"></i>${candId?'Edit Candidate':'Add Candidate'}`;
  if(candId) {
    spGetOne('Candidates',candId).then(c=>{
      document.getElementById('cm-name').value=c.Title||'';
      document.getElementById('cm-nat').value=c.Nationality||'';
      document.getElementById('cm-agency').value=c.AgencyName||'';
      document.getElementById('cm-phone').value=c.Phone||'';
      document.getElementById('cm-email').value=c.Email||'';
      document.getElementById('cm-cvlink').value=c.CVLink||'';
      document.getElementById('cm-status').value=c.CandidateStatus||'Applied';
      document.getElementById('cm-notes').value=c.Notes||'';
    }).catch(e=>toast(e.message,'danger'));
  }
  document.getElementById('btn-cm-save').onclick=saveCandidateModal;
  new bootstrap.Modal(document.getElementById('modalCandidate')).show();
}

async function saveCandidateModal() {
  const{vacId,candId}=S.pendingCand;
  const name=document.getElementById('cm-name').value.trim();
  if(!name){toast('Name is required','warning');return;}
  const data={Title:name,VacancyId:vacId,Nationality:document.getElementById('cm-nat').value||null,AgencyName:document.getElementById('cm-agency').value||null,Phone:document.getElementById('cm-phone').value||null,Email:document.getElementById('cm-email').value||null,CVLink:document.getElementById('cm-cvlink').value||null,CandidateStatus:document.getElementById('cm-status').value||'Applied',Notes:document.getElementById('cm-notes').value||null};
  const btn=document.getElementById('btn-cm-save');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Saving…';}
  try {
    if(candId) { await spUpdate('Candidates',candId,data); toast('Candidate updated'); }
    else { await spCreate('Candidates',data); toast('Candidate added'); }
    bootstrap.Modal.getInstance(document.getElementById('modalCandidate'))?.hide();
    loadCandidatesSection(vacId);
  } catch(e) { toast(`Save failed: ${e.message}`,'danger'); }
  finally { if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-floppy me-1"></i>Save';} }
}

// ═══════════════════════════════════════════════════════════════════
// VIEW: SALARY
// ═══════════════════════════════════════════════════════════════════
async function renderSalary() {
  const el=document.getElementById('v-salary'); spin(el);
  try {
    const rates=await spGet('SalaryRates','?$select=Id,Title,EffectiveYear,SalaryMin,SalaryMax,Currency,CBACode,SeniorityLevel,IsNegotiatedRate,ClientId,Client/Title,RankId,Rank/Title&$expand=Client,Rank&$orderby=EffectiveYear desc,Client/Title,Rank/Title&$top=1000');
    if(!rates.length){el.innerHTML=`<h4 class="sec-title">Salary Reference</h4><div class="alert alert-info"><i class="bi bi-info-circle me-2"></i>No salary rates entered yet.</div>`;return;}
    const years=[...new Set(rates.map(r=>r.EffectiveYear).filter(Boolean))].sort((a,b)=>b-a);
    const clientOpts=[...new Set(rates.map(r=>r.Client?.Title).filter(Boolean))].sort().map(c=>`<option value="${h(c)}">${h(c)}</option>`).join('');
    window._salRates=rates;
    el.innerHTML=`<h4 class="sec-title">Salary Reference</h4><div class="card shadow-sm mb-3"><div class="card-body py-2"><div class="row g-2"><div class="col-auto"><select class="form-select form-select-sm" id="sr-year" onchange="filterSalary()"><option value="">All years</option>${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div><div class="col-auto"><select class="form-select form-select-sm" id="sr-client" onchange="filterSalary()"><option value="">All clients</option>${clientOpts}</select></div><div class="col"><input class="form-control form-control-sm" id="sr-search" type="text" placeholder="Rank…" oninput="filterSalary()"></div></div></div></div><div id="salary-table"></div>`;
    const curYear=new Date().getFullYear(); if(years.includes(curYear)) document.getElementById('sr-year').value=curYear;
    filterSalary();
  } catch(e){el.innerHTML=errBox(e);}
}
function filterSalary() {
  const year=document.getElementById('sr-year')?.value||'',client=document.getElementById('sr-client')?.value||'',q=(document.getElementById('sr-search')?.value||'').toLowerCase();
  const rates=(window._salRates||[]).filter(r=>{if(year&&String(r.EffectiveYear)!==year)return false;if(client&&r.Client?.Title!==client)return false;if(q&&!(r.Rank?.Title||'').toLowerCase().includes(q))return false;return true;});
  const rows=rates.length?rates.map(r=>`<tr><td>${r.EffectiveYear||'—'}</td><td>${h(r.Client?.Title||'—')}</td><td>${h(r.Rank?.Title||'—')}</td><td class="text-nowrap">${fmtSalary(r.SalaryMin,r.SalaryMax,r.Currency)}</td><td>${r.SeniorityLevel||'—'}</td><td>${h(r.CBACode||'—')}</td><td>${r.IsNegotiatedRate?'<span class="badge bg-warning text-dark">Negotiated</span>':''}</td></tr>`).join(''):`<tr><td colspan="7" class="text-center text-muted py-4">No rates match.</td></tr>`;
  document.getElementById('salary-table').innerHTML=`<div class="card shadow-sm"><div class="table-responsive"><table class="table table-sm table-hover mb-0"><thead style="background:var(--mc-navy);color:#fff"><tr><th>Year</th><th>Client</th><th>Rank</th><th>Salary</th><th>Seniority</th><th>CBA</th><th></th></tr></thead><tbody>${rows}</tbody></table></div><div class="card-footer text-muted" style="font-size:.78rem">${rates.length} rate${rates.length!==1?'s':''}</div></div>`;
}

async function renderAdmin() {
  const el=document.getElementById('v-admin');
  el.innerHTML=`<h4 class="sec-title">Admin — Reference Lists</h4><div class="alert alert-info mb-3"><i class="bi bi-info-circle me-2"></i>Reference lists can be managed directly in SharePoint. Full in-app editor coming in Phase 3d.</div>
  <div class="row g-3 mb-4">${[['VesselMaster','Vessels','bi-ship',`${S.vessels.length} active`],['ClientMaster','Clients','bi-building',`${S.clients.filter(c=>c.IsActive).length} active`],['RankList','Ranks','bi-person-badge',`${S.ranks.length} active`],['AgencyList','Agencies','bi-people',`${S.agencies.length} active`],['SalaryRates','Salary Rates','bi-cash-stack','']].map(([list,label,icon,count])=>`<div class="col-6 col-md-4 col-lg-3 col-xl-2"><a href="${SP_SITE}/Lists/${list}" target="_blank" class="card text-decoration-none shadow-sm h-100 text-center p-3"><i class="bi ${icon} fs-2 mb-2" style="color:var(--mc-blue)"></i><div class="fw-bold">${label}</div>${count?`<div class="text-muted" style="font-size:.78rem">${count}</div>`:''}</a></div>`).join('')}</div>
  <h5 class="sec-title">Vacancy Stats</h5><div id="admin-stats"><div class="spinner-border spinner-border-sm text-secondary"></div></div>`;
  try { const all=await loadVacancies(null); const by={}; all.forEach(v=>{by[v.Status]=(by[v.Status]||0)+1;}); document.getElementById('admin-stats').innerHTML=`<div class="row g-2">${Object.entries(by).map(([s,n])=>`<div class="col-auto"><div class="card shadow-sm text-center px-4 py-3"><div class="fs-3 fw-bold" style="color:var(--mc-navy)">${n}</div><div>${statusBadge(s)}</div></div></div>`).join('')}<div class="col-auto"><div class="card shadow-sm text-center px-4 py-3"><div class="fs-3 fw-bold" style="color:var(--mc-navy)">${all.length}</div><div class="text-muted" style="font-size:.8rem">Total</div></div></div></div>`; }
  catch(e){document.getElementById('admin-stats').innerHTML=`<span class="text-muted small">${e.message}</span>`;}
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
async function init() {
  try {
    // Handle OAuth callback (code in URL after Microsoft login redirect)
    await handleCallback();

    // Check if we have a valid token in session
    const at  = sessionStorage.getItem('at');
    const exp = parseInt(sessionStorage.getItem('at_exp') || '0');

    if (!at || Date.now() > exp - 60000) {
      // No valid token — show login screen
      document.getElementById('login-screen').classList.add('show');
      document.body.style.paddingTop = '0';
      return;
    }

    // Valid token — show the app
    S.userName = sessionStorage.getItem('uname') || '';
    document.getElementById('user-display').textContent = S.userName;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').classList.remove('d-none');
    document.getElementById('app-container').classList.remove('d-none');

    await loadRefData();
    nav('open');

  } catch(e) {
    document.body.style.cssText = 'margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f6f9;font-family:sans-serif';
    document.body.innerHTML = `<div style="text-align:center;padding:2rem;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:480px">
      <div style="font-size:2rem">⚠️</div><h3 style="color:#1F3864">Something went wrong</h3>
      <p style="color:#555">${h(e.message)}</p>
      <button onclick="sessionStorage.clear();location.reload()" style="padding:.6rem 1.5rem;background:#1F3864;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:1rem">Try again</button>
    </div>`;
  }
}

init();
</script>
